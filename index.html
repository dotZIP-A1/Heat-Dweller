<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heat Dweller</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      background: #080808;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #titleScreen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(180deg, rgba(2,2,5,0.6), rgba(0,0,0,0.7));
      padding: 24px;
      pointer-events: auto;
      z-index: 100;
      color: #e8e8e8;
      font-family: Inter, system-ui, sans-serif;
    }

    #titleScreen h2 {
      margin: 0;
      font-size: 3rem;
      letter-spacing: 0.02em;
    }

    #titleScreen p {
      margin-top: 18px;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="titleScreen" role="dialog" aria-label="Title screen">
    <div style="max-width: 820px;">
      <h2>Heat Dweller</h2>
      <p style="color:#9da5b4;line-height:1.5;">Close-to-home Rougelite</p>
      <p style="color:#cbd5e1;font-weight:600;">Press Enter to play.</p>
    </div>
  </div>

  <script type="module" src="./src/renderer.js"></script>
</body>
</html>
